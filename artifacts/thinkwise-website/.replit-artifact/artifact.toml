kind = "web"
previewPath = "/"
title = "ThinkWise Website"
version = "1.0.0"
id = "artifacts/thinkwise-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21210
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/thinkwise-website run dev"

[services.env]
PORT = "21210"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/thinkwise-website", "run", "build"]
publicDir = "artifacts/thinkwise-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
